name: Release On Main

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-change:
    name: Detect declared version change
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - name: Checkout version commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Compare package versions
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREVIOUS_VERSION=$(git show "$BEFORE_SHA:package.json" | node -e "process.stdout.write(JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version)")
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "package.json changed without a version change; release skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version change: $PREVIOUS_VERSION -> $CURRENT_VERSION" >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Publish declared package version
    needs: version-change
    if: needs.version-change.outputs.changed == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    secrets:
      # Preserve token-based npm publishing while scoping NODE_AUTH_TOKEN to
      # the canonical workflow's single publish step.
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
