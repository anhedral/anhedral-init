name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: version
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm version is unpublished
        run: |
          if npm view "anhedral@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "anhedral@${{ steps.version.outputs.version }} is already published"
            exit 1
          fi

      - name: Build package
        run: pnpm build

      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish package
        run: npm publish --provenance=false --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
