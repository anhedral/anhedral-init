name: Release

on:
  workflow_call:
    inputs:
      release_sha:
        description: Exact commit containing the prepared release version
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_NODE_VERSION: '24.18.0'

concurrency:
  group: npm-publish-anhedral
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and pack
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      integrity: ${{ steps.metadata.outputs.integrity }}
      tarball: ${{ steps.metadata.outputs.tarball }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.release_sha }}

      - name: Require a commit from main
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          if ! git merge-base --is-ancestor "$RELEASE_SHA" "refs/remotes/origin/main"; then
            echo "Release commit $RELEASE_SHA is not contained in origin/main"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks
        run: pnpm release:check

      - name: Build release artifact
        run: pnpm release:pack

      - name: Verify release artifact
        run: pnpm release:artifact:verify

      - name: Smoke test exact release artifact
        run: pnpm release:artifact:smoke

      - name: Read release metadata
        id: metadata
        run: |
          VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('release-artifact/metadata.json', 'utf8')).version")
          TARBALL=$(node -p "JSON.parse(require('node:fs').readFileSync('release-artifact/metadata.json', 'utf8')).filename")
          INTEGRITY=$(node -p "JSON.parse(require('node:fs').readFileSync('release-artifact/metadata.json', 'utf8')).integrity")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "integrity=$INTEGRITY" >> "$GITHUB_OUTPUT"
          echo "artifact_name=anhedral-$VERSION" >> "$GITHUB_OUTPUT"

      - name: Refuse an existing tag from another commit
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git rev-parse --quiet --verify "refs/tags/$TAG" >/dev/null; then
            TAG_COMMIT=$(git rev-parse "refs/tags/$TAG^{commit}")
            if [ "$TAG_COMMIT" != "$RELEASE_SHA" ]; then
              echo "$TAG already points to $TAG_COMMIT; refusing to publish $RELEASE_SHA"
              exit 1
            fi
          fi

      - name: Upload verified artifact
        id: artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: release-artifact/
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Record artifact digest
        run: echo "Artifact digest ${{ steps.artifact.outputs.artifact-digest }}" >> "$GITHUB_STEP_SUMMARY"

  portability:
    name: Exact artifact (${{ matrix.os }}, Node ${{ matrix.node }})
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
        node:
          - '20.19.0'
          - '22.12.0'
          - '24.18.0'
    steps:
      - name: Checkout artifact verification code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Download exact verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: release-artifact

      - name: Verify and execute exact artifact
        env:
          ANHEDRAL_EXPECTED_FILENAME: ${{ needs.verify.outputs.tarball }}
          ANHEDRAL_EXPECTED_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          ANHEDRAL_EXPECTED_NAME: anhedral
          ANHEDRAL_EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          node scripts/verify-release-artifact.mjs release-artifact/metadata.json
          node tests/test-packed-cli.js release-artifact/metadata.json

  runtime-acceptance:
    name: Runtime acceptance (${{ matrix.target }})
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - desktop
          - extension
          - mobile
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.release_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.13.0'
          package-manager-cache: false

      - name: Setup Java for Android
        if: matrix.target == 'mobile'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Require Android SDK
        if: matrix.target == 'mobile'
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          test -n "$SDK_ROOT"
          test -d "$SDK_ROOT"
          java -version

      - name: Reclaim Android build space
        if: matrix.target == 'mobile'
        run: bash scripts/reclaim-android-ci-space.sh

      - name: Download exact verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: release-artifact

      - name: Verify exact release artifact
        env:
          ANHEDRAL_EXPECTED_FILENAME: ${{ needs.verify.outputs.tarball }}
          ANHEDRAL_EXPECTED_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          ANHEDRAL_EXPECTED_NAME: anhedral
          ANHEDRAL_EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: node scripts/verify-release-artifact.mjs release-artifact/metadata.json

      - name: Discover Chromium
        if: matrix.target == 'extension'
        run: |
          CHROMIUM_PATH=$(command -v chromium || command -v chromium-browser || true)
          if [ -z "$CHROMIUM_PATH" ]; then
            echo "Unbranded Chromium is required for extension runtime acceptance"
            exit 1
          fi
          "$CHROMIUM_PATH" --version
          echo "ANHEDRAL_CHROME_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"

      - name: Require Xvfb
        if: matrix.target == 'desktop'
        run: command -v xvfb-run

      - name: Exercise generated runtime
        run: node tests/test-runtime-acceptance.js ${{ matrix.target }} release-artifact/metadata.json

  publish:
    name: Publish verified artifact
    needs:
      - verify
      - portability
      - runtime-acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Require OIDC-capable npm
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm $NPM_VERSION"
          node -e "const match = /^(\d+)\.(\d+)\.(\d+)/.exec(process.argv[1]); const minimum = [11, 5, 1]; const actual = match?.slice(1).map(Number); const difference = actual?.findIndex((part, index) => part !== minimum[index]); if (!actual || (difference >= 0 && actual[difference] < minimum[difference])) { throw new Error('npm 11.5.1 or newer is required for trusted publishing') }" "$NPM_VERSION"

      - name: Download verified artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: release-artifact

      - name: Recheck artifact integrity
        env:
          ANHEDRAL_EXPECTED_FILENAME: ${{ needs.verify.outputs.tarball }}
          ANHEDRAL_EXPECTED_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          ANHEDRAL_EXPECTED_NAME: anhedral
          ANHEDRAL_EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: node scripts/verify-release-artifact.mjs release-artifact/metadata.json

      - name: Check npm registry state
        id: registry
        run: |
          STATE=$(node scripts/check-release-registry.mjs preflight release-artifact/metadata.json)
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "Registry state before publish: $STATE" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish package
        if: steps.registry.outputs.state == 'missing'
        env:
          TARBALL: ${{ needs.verify.outputs.tarball }}
        run: npm publish "./release-artifact/$TARBALL" --ignore-scripts --provenance --registry=https://registry.npmjs.org

      - name: Verify npm registry integrity
        run: node scripts/check-release-registry.mjs verify release-artifact/metadata.json

      - name: Summarize publication
        run: |
          echo "npm package: anhedral@${{ needs.verify.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "integrity: ${{ needs.verify.outputs.integrity }}" >> "$GITHUB_STEP_SUMMARY"

  tag:
    name: Tag and create GitHub release
    needs:
      - verify
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout published commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.RELEASE_NODE_VERSION }}
          package-manager-cache: false

      - name: Download published artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.artifact_name }}
          path: release-artifact

      - name: Recheck published artifact
        env:
          ANHEDRAL_EXPECTED_FILENAME: ${{ needs.verify.outputs.tarball }}
          ANHEDRAL_EXPECTED_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          ANHEDRAL_EXPECTED_NAME: anhedral
          ANHEDRAL_EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: node scripts/verify-release-artifact.mjs release-artifact/metadata.json

      - name: Verify declared version
        env:
          EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "package.json version $PACKAGE_VERSION does not match published version $EXPECTED_VERSION"
            exit 1
          fi

      - name: Create or verify tag
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_COMMIT=$(git rev-parse "refs/tags/$TAG^{commit}")
            if [ "$TAG_COMMIT" != "$RELEASE_SHA" ]; then
              echo "$TAG points to $TAG_COMMIT instead of published commit $RELEASE_SHA"
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG" "$RELEASE_SHA"
            git push origin "refs/tags/$TAG"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ needs.verify.outputs.tarball }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          TAG="v$VERSION"
          ASSET="release-artifact/$TARBALL"
          METADATA="release-artifact/metadata.json"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "$ASSET#npm package tarball" \
              "$METADATA#release integrity metadata" \
              --clobber
          else
            gh release create "$TAG" \
              "$ASSET#npm package tarball" \
              "$METADATA#release integrity metadata" \
              --verify-tag \
              --generate-notes \
              --title "$TAG"
          fi
