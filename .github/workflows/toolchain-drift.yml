name: Toolchain Drift

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: toolchain-drift-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E ${{ matrix.lane.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: stable
            command: pnpm test:e2e
          - name: latest
            command: pnpm test:e2e:latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run toolchain drift matrix
        run: ${{ matrix.lane.command }}

  runtime-acceptance:
    name: Runtime acceptance (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - desktop
          - extension
          - mobile
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.13.0'
          cache: pnpm

      - name: Setup Java for Android
        if: matrix.target == 'mobile'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Require Android SDK
        if: matrix.target == 'mobile'
        run: |
          SDK_ROOT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          test -n "$SDK_ROOT"
          test -d "$SDK_ROOT"
          java -version

      - name: Reclaim Android build space
        if: matrix.target == 'mobile'
        run: bash scripts/reclaim-android-ci-space.sh

      - name: Install generator dependencies
        run: pnpm install --frozen-lockfile

      - name: Discover Chromium
        if: matrix.target == 'extension'
        run: |
          CHROMIUM_PATH=$(command -v chromium || command -v chromium-browser || true)
          if [ -z "$CHROMIUM_PATH" ]; then
            echo "Unbranded Chromium is required for extension runtime acceptance"
            exit 1
          fi
          "$CHROMIUM_PATH" --version
          echo "ANHEDRAL_CHROME_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"

      - name: Require Xvfb
        if: matrix.target == 'desktop'
        run: command -v xvfb-run

      - name: Exercise generated runtime
        run: pnpm test:acceptance:${{ matrix.target }}
