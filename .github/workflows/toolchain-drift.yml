name: Toolchain Drift

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

concurrency:
  group: toolchain-drift-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E ${{ matrix.lane.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: stable
            command: pnpm test:e2e
          - name: latest
            command: pnpm test:e2e:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run toolchain drift matrix
        run: ${{ matrix.lane.command }}
